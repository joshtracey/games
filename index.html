<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #181b24;
      --border: rgba(255,255,255,.08);
      --text: #f0ede8;
      --muted: #5a6070;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
    }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; min-height: 100%;
    }
    .wrap { width: 100%; max-width: 680px; }

    header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px; }
    h1 {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: clamp(2rem, 7vw, 3rem); line-height: 1; letter-spacing: -.02em;
    }
    h1 em { font-style: italic; font-weight: 400; color: var(--muted); }
    .sub { font-size: .8rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: var(--text);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      transition: border-color .2s, transform .2s;
      position: relative; overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 14px 0 0 14px;
    }
    .card-go::after    { background: #d97706; }
    .card-bg::after    { background: #2563eb; }
    .card-crib::after  { background: #16a34a; }
    .card-chess::after { background: #9333ea; }
    .card-3xo::after   { background: #e84c4c; }
    .card:hover { border-color: rgba(255,255,255,.18); transform: translateY(-2px); }

    .icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; width: 32px; text-align: center; }
    .info { min-width: 0; }
    .game-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; line-height: 1.1; }
    .game-desc { font-size: .75rem; color: var(--muted); margin-top: 3px; line-height: 1.3; }

    .card-3xo { grid-column: span 2; }
    .card-3xo .game-desc { max-width: 340px; }

    footer { margin-top: 16px; font-size: .75rem; color: var(--muted); text-align: center; }

    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr; }
      .card-3xo { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Classic <em>games</em></h1>
      <span class="sub">Pass &amp; play</span>
    </header>

    <div class="grid">
      <a href="go/" class="card card-go">
        <div class="icon">⬤</div>
        <div class="info">
          <div class="game-name">Go</div>
          <div class="game-desc">9×9 · 13×13 · 19×19 strategy</div>
        </div>
      </a>

      <a href="backgammon/" class="card card-bg">
        <div class="icon">⬡</div>
        <div class="info">
          <div class="game-name">Backgammon</div>
          <div class="game-desc">Race &amp; capture to home</div>
        </div>
      </a>

      <a href="chess/" class="card card-chess">
        <div class="icon">♟</div>
        <div class="info">
          <div class="game-name">Chess</div>
          <div class="game-desc">Full rules · castling · en passant</div>
        </div>
      </a>

      <a href="cribbage/" class="card card-crib">
        <div class="icon">♣</div>
        <div class="info">
          <div class="game-name">Cribbage</div>
          <div class="game-desc">Scoreboard · 2–3 players · 121</div>
        </div>
      </a>

      <a href="3xo/" class="card card-3xo">
        <div class="icon">◎</div>
        <div class="info">
          <div class="game-name">3XO</div>
          <div class="game-desc">Ring strategy · 2–4 players · stack, line, or escalate to win</div>
        </div>
      </a>
    </div>

    <footer>joshtracey.github.io/games · no accounts · no ads</footer>
  </div>
</body>
</html>
